<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{
  background:#0D0221;
  color:#E8E0F0;
  overflow:hidden;
  height:100dvh;
  width:100vw;
  position:fixed;
  top:0;left:0;
  margin:0;
}
#app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  max-width:640px;
  margin:0 auto;
  width:100%;
}
#main-scroll{
  flex:1;
  overflow-y:auto;
  padding:20px;
}
.screen{
  display:none;
}
.screen.active{display:block}
.nav{
  position:fixed;
  bottom:0;
  left:0;right:0;
  display:flex;
  justify-content:space-around;
  padding:8px 10px;
  background:rgba(13,2,33,0.9);
  border-top:1px solid rgba(255,255,255,0.1);
  max-width:640px;
  margin:0 auto;
}
</style>
</head>
<body>
<div id="app">
<div id="main-scroll">
<div class="screen active" id="screen-input">
  <h1 style="font-size:24px">每个随意念头，都值得长成一棵树 🌱</h1>
  <p>选一个方向，或自己输入</p>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin:12px 0">
    <span class="chip">🧸 解压玩具</span>
    <span class="chip">🌙 失眠</span>
    <span class="chip">🐱 宠物</span>
  </div>
  <textarea placeholder="输入任何你好奇的方向..." style="width:100%;height:60px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#E8E0F0;padding:12px;font-size:16px"></textarea>
  <button style="width:100%;padding:14px;background:#9C4DF0;color:white;border:none;border-radius:12px;font-size:16px;margin-top:16px">✨ 开始发牌</button>
</div>
</div>
</div>
<nav class="nav">
  <button>✨ 输入</button>
  <button>📦 暂存</button>
  <button>🧬 杂交</button>
</nav>
</div>
</body>
</html>
