<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>✨ 灵感火花</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0221;--card:#1A0533;--primary:#7B2D8E;--cyan:#00D4FF;--green:#00E676;--orange:#FF8C42;--pink:#FF6B9D;--text:#F5F5F5;--muted:#B0B0B0;--nav-h:64px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden;-webkit-text-size-adjust:100%}
body{-webkit-font-smoothing:antialiased}
.app-wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:var(--nav-h)}
/* Top bar */
.top-bar{position:sticky;top:0;z-index:51;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;padding-top:calc(8px + var(--safe-t));background:rgba(13,2,33,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(123,45,142,0.15)}
.top-bar .user{display:flex;align-items:center;gap:6px;cursor:pointer}
.top-bar .avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(0,212,255,0.4);display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(0,212,255,0.08)}
.top-bar .user-name{color:var(--text);font-size:12px;white-space:nowrap}
.top-bar .title{font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--cyan),#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .bell{font-size:17px;cursor:pointer;padding:4px}
/* Login */
.screen{display:none;padding:12px 16px;padding-bottom:calc(12px + var(--nav-h))}
.screen.active{display:block}
.login-screen{text-align:center;padding-top:24px}
.login-icon{font-size:64px;margin:16px 0}
.login-title{font-size:26px;font-weight:700;background:linear-gradient(90deg,var(--cyan),#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.login-input{width:100%;max-width:280px;padding:12px 16px;border-radius:12px;border:1px solid rgba(123,45,142,0.4);background:rgba(26,5,51,0.8);color:var(--text);font-size:15px;text-align:center;outline:none;margin-bottom:20px}
.login-input:focus{border-color:var(--cyan)}
.avatar-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:320px;margin:0 auto 24px}
.avatar-option{width:48px;height:48px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .2s;background:rgba(26,5,51,0.6)}
.avatar-option.sel{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.3)}
/* Buttons */
.btn{display:inline-block;padding:14px 48px;border-radius:24px;border:none;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-sm{display:block;width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-sm:active{opacity:.85}
/* Sub nav */
.subnav{display:flex;gap:8px;padding:8px 0 12px}
.subnav button{flex:1;padding:8px;border-radius:10px;border:1px solid rgba(123,45,142,0.3);background:rgba(26,5,51,0.6);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.subnav button.active{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.4);color:var(--cyan)}
/* Theme grid */
.pick-section{margin-bottom:16px}
.pick-label{font-size:14px;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pick-label .icon{font-size:18px}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.theme-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid rgba(123,45,142,0.15);cursor:pointer;transition:all .2s;text-align:center}
.theme-card:active{transform:scale(.97);border-color:var(--cyan)}
.theme-card .emoji{font-size:28px;margin-bottom:6px}
.theme-card .name{font-size:14px;font-weight:600;margin-bottom:4px}
.theme-card .heat{font-size:11px;color:var(--muted)}
/* Card swipe */
.card-area{position:relative;height:380px;margin:8px 0;overflow:hidden}
.card-stack{position:relative;width:100%;height:100%}
.card{position:absolute;width:100%;height:100%;background:var(--card);border-radius:16px;padding:24px;display:flex;flex-direction:column;border:1px solid rgba(123,45,142,0.2);transition:transform .3s,opacity .3s;user-select:none;-webkit-user-select:none;touch-action:pan-y}
.card .card-title{font-size:20px;font-weight:700;color:var(--cyan);margin-bottom:10px}
.card .card-body{font-size:15px;line-height:1.7;color:var(--text);flex:1;display:flex;align-items:center}
.card .card-tag{font-size:11px;color:var(--muted);margin-top:8px;background:rgba(123,45,142,0.2);display:inline-block;padding:3px 10px;border-radius:10px;align-self:flex-start}
.swipe-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
.swipe-buttons{display:flex;justify-content:center;gap:20px;margin-top:10px}
.swipe-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:transform .15s}
.swipe-btn:active{transform:scale(.85)}
.swipe-btn.x{background:rgba(255,68,68,0.15);color:#F44}
.swipe-btn.h{background:rgba(0,230,118,0.15);color:var(--green)}
.swipe-btn.m{background:rgba(0,212,255,0.15);color:var(--cyan)}
/* Community feed */
.community{margin-top:20px;border-top:1px solid rgba(123,45,142,0.12);padding-top:14px}
.community h4{font-size:14px;color:var(--cyan);margin-bottom:10px}
.community-post{background:rgba(26,5,51,0.5);border-radius:10px;padding:12px;margin-bottom:8px}
.community-post .author{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.community-post .author-avatar{width:24px;height:24px;border-radius:50%;background:rgba(0,212,255,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--cyan);font-weight:600}
.community-post .author-name{font-size:12px;color:var(--text)}
.community-post .author-badge{font-size:10px;color:var(--cyan);background:rgba(0,212,255,0.1);padding:1px 6px;border-radius:6px}
.community-post .time{font-size:10px;color:var(--muted);margin-left:auto}
.community-post .content{font-size:13px;line-height:1.6;color:var(--text)}
/* Seeds */
.saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.saved-header h3{font-size:16px;color:var(--cyan)}
.empty-state{text-align:center;padding:32px 0;color:var(--muted);font-size:14px;line-height:1.8}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.saved-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.saved-card{background:var(--card);border-radius:10px;padding:10px;border:1px solid rgba(123,45,142,0.15);cursor:pointer;font-size:13px;position:relative;transition:border .2s}
.saved-card.sel{border-color:var(--cyan)}
.saved-card .chk{position:absolute;top:6px;right:8px;font-size:16px;color:var(--green)}
/* Hybrid */
.pick-row{display:flex;gap:10px}
.hybrid-slot{flex:1;min-height:80px;background:rgba(26,5,51,0.5);border:1px dashed rgba(123,45,142,0.4);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:10px}
.hybrid-slot.filled{border-style:solid;border-color:rgba(0,212,255,0.3)}
.hybrid-slot .s-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.hybrid-slot .s-text{font-size:13px;text-align:center;word-break:break-word}
.result-card{width:100%;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:12px;padding:14px;margin-top:10px;text-align:center;font-size:14px}
.result-card .r-label{font-size:11px;color:var(--green);margin-bottom:4px}
/* Tree */
.tree-info{display:flex;gap:16px;justify-content:center;margin:12px 0}
.tree-stat{text-align:center}
.tree-stat .num{font-size:24px;font-weight:700;color:var(--cyan)}
.tree-stat .lbl{font-size:11px;color:var(--muted)}
.tree-viz{padding:12px;background:rgba(26,5,51,0.3);border-radius:12px;min-height:80px;margin:8px 0;font-size:13px;line-height:1.8}
.log-entry{padding:8px;margin:4px 0;background:rgba(26,5,51,0.3);border-radius:8px;font-size:12px;color:var(--muted)}
/* Arena */
.arena-placeholder{text-align:center;padding:40px 0;color:var(--muted)}
.arena-placeholder .icon{font-size:56px;margin-bottom:16px}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:6px 0;padding-bottom:calc(6px + var(--safe-b));background:rgba(13,2,33,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(123,45,142,0.15);z-index:50;height:calc(var(--nav-h) + var(--safe-b));max-width:480px;margin:0 auto}
.nav-item{text-align:center;cursor:pointer;color:var(--muted);font-size:10px;padding:4px 12px;border-radius:8px;transition:color .2s;touch-action:manipulation;flex:1}
.nav-item.active{color:var(--cyan)}
.nav-item .icon{font-size:22px;margin-bottom:1px;line-height:1}
.nav-item .lbl{line-height:1}
/* Toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
/* Modal */
.pick-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:60;overflow-y:auto;padding:40px 16px;max-width:480px;margin:0 auto}
.pick-modal .close-btn{display:block;margin:16px auto;padding:10px 30px;border-radius:20px;border:1px solid var(--muted);background:none;color:var(--muted);cursor:pointer;font-size:14px}
/* Back link */
.back-link{color:var(--cyan);cursor:pointer;font-size:13px;margin-bottom:4px;display:inline-block}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="app-wrap">
  <div id="toast" class="toast"></div>

  <!-- Top Bar -->
  <div class="top-bar" id="top-bar" style="display:none">
    <div class="user" onclick="showNav('seeds')">
      <div class="avatar" id="bar-avatar">🦞</div>
      <span class="user-name" id="bar-name">Sky</span>
    </div>
    <span class="title">✨ 灵感火花</span>
    <span class="bell">🔔</span>
  </div>

  <main id="main-scroll">
    <!-- ===== Login ===== -->
    <div class="screen active" id="screen-login">
      <div class="login-screen">
        <div class="login-icon">⚡</div>
        <div class="login-title">灵感火花</div>
        <div class="login-sub">碎片时间 · 深度思考 · 创意碰撞</div>
        <input class="login-input" id="login-name" placeholder="给自己起个名字" maxlength="12">
        <div class="avatar-grid" id="avatar-grid"></div>
        <button class="btn" onclick="startExplore()">开始探索 🚀</button>
      </div>
    </div>

    <!-- ===== Inspire Tab ===== -->
    <div class="screen" id="screen-inspire">
      <!-- Theme selection -->
      <div id="inspire-pick">
        <div class="pick-section">
          <div class="pick-label"><span class="icon">🎯</span>选个方向，开始碰撞灵感</div>
          <div class="theme-grid" id="theme-grid"></div>
        </div>
        <!-- Community feed -->
        <div class="community">
          <h4>🌟 社区杂交成果</h4>
          <div id="community-feed"></div>
        </div>
      </div>
      <!-- Card swipe -->
      <div id="inspire-swipe" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px">
          <span class="back-link" onclick="showPick()">← 换方向</span>
          <span id="theme-label" style="font-weight:600;font-size:15px;color:var(--cyan)">解压玩具</span>
          <span style="color:var(--muted);font-size:12px" id="card-count">0 张</span>
        </div>
        <div class="card-area"><div class="card-stack" id="card-stack"></div></div>
        <div style="text-align:center;font-size:12px;color:var(--muted);padding:4px 0">
          ✨ 已收藏 <strong id="saved-count">0</strong> 张灵感种子
        </div>
        <div class="swipe-buttons">
          <div class="swipe-btn x" onclick="swipeL()">✕</div>
          <div class="swipe-btn m" onclick="swipeM()">⚡</div>
          <div class="swipe-btn h" onclick="swipeR()">♥</div>
        </div>
        <div class="swipe-hint">左滑淘汰 · 右滑留种 · ⚡ 突变</div>
      </div>
    </div>

    <!-- ===== Seeds Tab ===== -->
    <div class="screen" id="screen-seeds">
      <div class="subnav" id="seeds-subnav">
        <button data-tab="saved" class="active" onclick="seedTab('saved')">📦 暂存</button>
        <button data-tab="hybrid" onclick="seedTab('hybrid')">🧬 杂交</button>
        <button data-tab="tree" onclick="seedTab('tree')">🌳 进化树</button>
      </div>
      <div id="seeds-saved">
        <div class="saved-header"><h3>📦 暂存池</h3><span style="color:var(--muted);font-size:12px" id="saved-label">0 张</span></div>
        <div id="saved-empty" class="empty-state">
          <div class="icon">🌱</div>
          还没有保存的种子<br>去「发现」页刷卡，右滑留种
        </div>
        <div id="saved-grid" class="saved-grid"></div>
        <div id="hybrid-btn-wrap" style="display:none;margin-top:12px">
          <button class="btn-sm" onclick="seedTab('hybrid')">🧬 杂交选中的两张卡片</button>
        </div>
      </div>
      <div id="seeds-hybrid" style="display:none">
        <h3 style="font-size:17px;margin-bottom:10px">🧬 创意杂交</h3>
        <div class="pick-row">
          <div class="hybrid-slot" id="slot-a" onclick="pickSlot('a')"><div class="s-label">卡片 A</div><div class="s-text" id="slot-a-text">点击选择</div></div>
          <div class="hybrid-slot" id="slot-b" onclick="pickSlot('b')"><div class="s-label">卡片 B</div><div class="s-text" id="slot-b-text">点击选择</div></div>
        </div>
        <button class="btn-sm" onclick="doHybrid()" id="hybrid-go" disabled>🧬 开始杂交</button>
        <div id="hybrid-result"></div>
        <div id="hybrid-explain" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
      </div>
      <div id="seeds-tree" style="display:none">
        <h3 style="font-size:17px;margin-bottom:10px">🌳 灵感进化树</h3>
        <div class="tree-info">
          <div class="tree-stat"><div class="num" id="tree-nodes">0</div><div class="lbl">节点</div></div>
          <div class="tree-stat"><div class="num" id="tree-depth">0</div><div class="lbl">深度</div></div>
          <div class="tree-stat"><div class="num" id="tree-logs">0</div><div class="lbl">孵化日志</div></div>
        </div>
        <div class="tree-viz" id="tree-viz"></div>
        <div style="font-weight:600;color:var(--cyan);margin:12px 0 4px">🥚 孵化日志</div>
        <div id="evo-logs"></div>
      </div>
      <!-- Pick modal -->
      <div class="pick-modal" id="pick-modal">
        <h3 style="margin-bottom:12px;text-align:center">选择卡片</h3>
        <div id="pick-list" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
        <button class="close-btn" onclick="closePickModal()">取消</button>
      </div>
    </div>

    <!-- ===== Arena Tab ===== -->
    <div class="screen" id="screen-arena">
      <div class="arena-placeholder">
        <div class="icon">⚡</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:8px">创意对战</div>
        <div style="font-size:14px;color:var(--muted)">即将上线</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">每周创意挑战 · 灵感对战 · 社区排行</div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active" data-screen="inspire" onclick="showNav('inspire')">
      <div class="icon">🔆</div><div class="lbl">灵感</div>
    </div>
    <div class="nav-item" data-screen="seeds" onclick="showNav('seeds')">
      <div class="icon">🌱</div><div class="lbl">种子</div>
    </div>
    <div class="nav-item" data-screen="arena" onclick="showNav('arena')">
      <div class="icon">⚡</div><div class="lbl">竞技</div>
    </div>
  </div>
</div>

<script>
// ===== State =====
var S={cards:[],saved:[],cardPoolIdx:0,hybridCards:{a:null,b:null},pickSlot:null,user:{name:'',avatar:'\u{1F99E}'}};
var THEMES=[{emoji:'\u{1F9F8}',name:'解压玩具',heat:50,domain:'玩具',tech:'创意'},
{emoji:'\u{1F634}',name:'失眠解决方案',heat:70,domain:'健康',tech:'硬件整合'},
{emoji:'\u{1F431}',name:'宠物产品',heat:30,domain:'宠物',tech:'创意'},
{emoji:'\u{1F916}',name:'AI效率工具',heat:60,domain:'效率',tech:'AI生成'},
{emoji:'\u{1F4DA}',name:'学习效率',heat:40,domain:'教育',tech:'gamification'},
{emoji:'\u{1F4AC}',name:'社交新方式',heat:55,domain:'社交',tech:'AI分析'}];
var CARDS={'\u89e3\u538b\u73a9\u5177':[
  {title:'烦恼粉碎机',body:'一个小型碎纸机造型的桌面玩具，你把烦恼写在纸条上塞进去，它缓慢粉碎的同时播放解压音乐，最后吐出一张"新的一天"小卡片。',tag:'#解压玩具'},
  {title:'无限撕膜日历',body:'每页都有一层超薄塑料膜可以撕，撕的手感和声音极度解压。一年366页，每撕一页出现一句随机暖心语录。',tag:'#解压玩具'},
  {title:'情绪天气瓶',body:'内置传感器检测室内温度和湿度，用灯光模拟不同天气——阳光、阴雨、彩虹、暴风雪，根据你的心率变化切换天气效果。',tag:'#解压玩具'},
],'\u5931\u7720\u89e3\u51b3\u65b9\u6848':[

  {title:'重力感应枕头',body:'枕头内置重力传感器，检测你的翻身频率。如果超过20分钟没睡着，枕头释放薰衣草微香并开始播放粉红噪音。',tag:'#失眠'},
],'\u5ba0\u7269\u4ea7\u54c1':[

  {title:'自动逗猫激光矩阵',body:'天花板安装的微型激光网格，AI识别猫咪位置后规划最优追逐路径，让猫咪永远抓不到但又不会失去兴趣。',tag:'#宠物'},
],'\u0041\u0049\u6548\u7387\u5de5\u5177':[
  {title:'语音灵感笔记',body:'边洗碗边说灵感，AI自动整理成结构化笔记。支持多轮对话追问，能把碎片想法串成完整方案。效率提升3倍。',tag:'#AI提效'},
  {title:'会议废话过滤器',body:'接入在线会议，实时过滤"我觉得""大概""可能"等无效信息，只保留实质讨论内容，自动生成可执行待办清单。',tag:'#AI提效'},
],'\u5b66\u4e60\u6548\u7387':[
  {title:'费曼学习卡',body:'把任何知识点自动生成"教给8岁小孩"版本的卡片，配合手绘风格插图。用最简单的语言讲清最复杂的概念。',tag:'#学习'},
],'\u793e\u4ea4\u65b0\u65b9\u5f0f':[
  {title:'随机午餐匹配',body:'每天中午12点随机匹配附近一位陌生人一起吃午饭，AI根据双方兴趣图谱生成破冰话题。吃完双方互评解锁新匹配。',tag:'#社交'},
]};
var COMMUNITY=[{author:'创想家Luna',init:'L',badge:'AI提效',time:'3小时前',
  content:'我把截图即输入做了三天，发现最好的输入不是截图而是语音——边洗碗边说灵感，AI自动整理。效率提了3倍。'},
{author:'产品狗阿杰',init:'J',badge:'宠物产品',time:'5小时前',
  content:'猫语翻译项圈杂交健康监测，产出"会说话的体重秤"——猫咪踩上去就播放撒娇语音催促喂食，主人手机收到喂食量和时间建议。'},
{author:'设计狮小美',init:'M',badge:'解压玩具',time:'8小时前',
  content:'情绪天气瓶+费曼学习卡杂交出"知识解压球"——捏不同颜色的小球弹出不同学科的知识卡片，边捏边学，焦虑变知识。'}];

// ===== Init =====
document.addEventListener('DOMContentLoaded',function(){
  var u=localStorage.getItem('ideaspark_user');
  if(u){S.user=JSON.parse(u);showMain();}else{initAvatars();}
});
function initAvatars(){
  var av=['\u{1F99E}','\u{1F98A}','\u{1F43C}','\u{1F431}','\u{1F9A5}','\u{1F419}','\u{1F984}','\u{1F432}'];
  var g=document.getElementById('avatar-grid');
  g.innerHTML=av.map(function(a,i){return '<div class="avatar-option'+(i===0?' sel':'')+'" onclick="pickAv(this,\''+a+'\')">'+a+'</div>';}).join('');
  S.user.avatar=av[0];
}
function pickAv(el,a){document.querySelectorAll('.avatar-option').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');S.user.avatar=a;}
function startExplore(){
  S.user.name=document.getElementById('login-name').value.trim()||'灵感家';
  localStorage.setItem('ideaspark_user',JSON.stringify(S.user));
  showMain();
}
function showMain(){
  document.getElementById('screen-login').classList.remove('active');
  var tb=document.getElementById('top-bar');tb.style.display='flex';
  document.getElementById('bar-avatar').textContent=S.user.avatar;
  document.getElementById('bar-name').textContent=S.user.name;
  showNav('inspire');
}

// ===== Navigation =====
function showNav(s){
  document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active');});
  if(s==='inspire'){document.getElementById('screen-inspire').classList.add('active');renderThemes();renderCommunity();}
  else if(s==='seeds'){document.getElementById('screen-seeds').classList.add('active');seedTab('saved');}
  else if(s==='arena'){document.getElementById('screen-arena').classList.add('active');}
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var m={inspire:'inspire',seeds:'seeds',arena:'arena'};
  var el=document.querySelector('.nav-item[data-screen="'+m[s]+'"]');
  if(el)el.classList.add('active');
  document.getElementById('main-scroll').scrollTop=0;
}
function showPick(){document.getElementById('inspire-pick').style.display='block';document.getElementById('inspire-swipe').style.display='none';}
function seedTab(t){
  document.querySelectorAll('#seeds-subnav button').forEach(function(b){b.classList.remove('active');});
  var btn=document.querySelector('#seeds-subnav button[data-tab="'+t+'"]');
  if(btn)btn.classList.add('active');
  ['saved','hybrid','tree'].forEach(function(x){var e=document.getElementById('seeds-'+x);if(e)e.style.display=x===t?'block':'none';});
  if(t==='saved')loadSaved();
  if(t==='tree'){renderTree();renderEvo();}
  updateHybridBtn();
}

// ===== Themes + Community =====
function renderThemes(){
  var g=document.getElementById('theme-grid');
  g.innerHTML=THEMES.map(function(t){
    return '<div class="theme-card" onclick="startSwipe(\''+t.name+'\')"><div class="emoji">'+t.emoji+'</div><div class="name">'+t.name+'</div><div class="heat">'+t.heat+'热度</div></div>';
  }).join('');
}
function renderCommunity(){
  var f=document.getElementById('community-feed');
  f.innerHTML=COMMUNITY.map(function(p){
    return '<div class="community-post"><div class="author"><div class="author-avatar">'+p.init+'</div><span class="author-name">'+p.author+'</span><span class="author-badge">'+p.badge+'</span><span class="time">'+p.time+'</span></div><div class="content">'+p.content+'</div></div>';
  }).join('');
}

// ===== Card Swipe =====
function startSwipe(theme){
  var cards=CARDS[theme]||[{title:'灵感种子',body:'这个方向的灵感还在孕育中…',tag:'#'+theme}];
  S.cards=[];
  for(var i=0;i<10;i++){var c=Object.assign({},cards[i%cards.length]);c.id='g'+i+Date.now();c.removed=false;S.cards.push(c);}
  document.getElementById('theme-label').textContent=theme;
  document.getElementById('inspire-pick').style.display='none';
  document.getElementById('inspire-swipe').style.display='block';
  document.getElementById('card-count').textContent=S.cards.length+' 张';
  renderCards();
}
function renderCards(){
  var stack=document.getElementById('card-stack');
  var vis=S.cards.filter(function(c){return !c.removed;}).slice(0,3);
  if(vis.length===0){stack.innerHTML='<div class="card"><div style="font-size:40px;margin-bottom:12px;text-align:center">🎉</div><div style="text-align:center;font-size:15px">本轮结束</div><div style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px">换个方向试试</div></div>';return;}
  stack.innerHTML=vis.map(function(c,i){return '<div class="card" id="card-'+c.id+'" style="z-index:'+(3-i)+';transform:scale('+(1-i*0.03)+') translateY('+(i*6)+'px);opacity:'+(1-i*0.15)+'"><div class="card-title">'+c.title+'</div><div class="card-body">'+c.body+'</div><div class="card-tag">'+c.tag+'</div></div>';}).join('');
  document.getElementById('card-count').textContent=S.cards.filter(function(c){return !c.removed;}).length+' 张';
}
function swipeL(){doSwipe('l');}
function swipeR(){doSwipe('r');}
function swipeM(){doSwipe('m');}
function doSwipe(d){
  var vis=S.cards.filter(function(c){return !c.removed;});
  if(vis.length===0)return;
  var c=vis[0];c.removed=true;
  if(d==='r'){
    if(!S.saved.find(function(s){return s.cid===c.id;})){
      S.saved.push({id:'s-'+Date.now(),cid:c.id,text:c.title+' '+c.body.substring(0,25)+'…',src:'swipe',ts:Date.now()});
      toast('\u{1F331} 已收藏');
    }
  }else if(d==='m'){
    var mut=c.title.split('').reverse().join('')+' × '+c.body.substring(0,12)+'…';
    S.saved.push({id:'s-'+Date.now(),cid:c.id+'-mut',text:mut,src:'mutate',ts:Date.now()});
    toast('\u26A1 突变种子已保存');
  }else{toast('\u2715 淘汰');}
  document.getElementById('saved-count').textContent=S.saved.length;
  renderCards();
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}

// ===== Saved =====
function loadSaved(){
  var g=document.getElementById('saved-grid'),e=document.getElementById('saved-empty');
  document.getElementById('saved-label').textContent=S.saved.length+' 张';
  if(S.saved.length===0){e.style.display='block';g.innerHTML='';return;}
  e.style.display='none';
  g.innerHTML=S.saved.map(function(s){return '<div class="saved-card'+(s._sel?' sel':'')+'" onclick="togSel(\''+s.id+'\')"><div style="font-size:13px;line-height:1.4">'+s.text+'</div><div style="font-size:11px;color:var(--muted);margin-top:3px">'+(s.src==='hybrid'?'\u{1F9EC}':'\u{1F3B4}')+' '+new Date(s.ts).toLocaleDateString()+'</div>'+(s._sel?'<span class="chk">\u2713</span>':'')+'</div>';}).join('');
  updateHybridBtn();
}
function togSel(id){var it=S.saved.find(function(s){return s.id===id;});if(!it)return;it._sel=!it._sel;if(S.saved.filter(function(s){return s._sel;}).length>2)it._sel=false;loadSaved();}
function updateHybridBtn(){var sel=S.saved.filter(function(s){return s._sel;});document.getElementById('hybrid-btn-wrap').style.display=sel.length===2?'block':'none';}

// ===== Hybrid =====
function pickSlot(s){S.pickSlot=s;var m=document.getElementById('pick-modal'),l=document.getElementById('pick-list');l.innerHTML=S.saved.map(function(s2){return '<div class="saved-card" onclick="selCard(\''+s+'\',\''+s2.id+'\',\''+s2.text.replace(/'/g,'\\\'')+'\')" style="font-size:12px">'+s2.text+'</div>';}).join('');m.style.display='block';}
function closePickModal(){document.getElementById('pick-modal').style.display='none';}
function selCard(slot,id,text){S.hybridCards[slot]={id:id,text:text};document.getElementById('slot-'+slot).classList.add('filled');document.getElementById('slot-'+slot+'-text').textContent=text;closePickModal();document.getElementById('hybrid-go').disabled=!(S.hybridCards.a&&S.hybridCards.b);}
async function doHybrid(){
  if(!S.hybridCards.a||!S.hybridCards.b)return;
  var a=S.hybridCards.a.text,b=S.hybridCards.b.text,result;
  try{
    var r=await fetch('/api/evolution/crossover?engine=llm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seed_a_text:a,seed_b_text:b})});
    result=await r.json();
  }catch(e){result={offspring:[a.substring(0,15)+' × '+b.substring(0,15)]};}
  var h=document.getElementById('hybrid-result');
  h.innerHTML=result.offspring.map(function(o,i){return '<div class="result-card"><div class="r-label">'+(i===0?'单点交叉':i===1?'均匀交叉':'变异交叉')+'</div>'+(typeof o==='string'?o:o.text||o.content||'')+'</div>';}).join('');
  document.getElementById('hybrid-explain').innerHTML=result.offspring.length>1?'<b>LLM杂交</b>':'📋 模板杂交';
  if(!document.getElementById('save-hybrid-btn')){
    var btn=document.createElement('button');btn.id='save-hybrid-btn';btn.className='btn-sm';btn.textContent='保存杂交结果';btn.onclick=saveHybridResult;
    h.appendChild(btn);
  }
}
function saveHybridResult(){
  document.querySelectorAll('.result-card').forEach(function(r,i){if(r.querySelector('.r-label')){var t=r.textContent.replace(r.querySelector('.r-label').textContent,'').trim();if(t)S.saved.push({id:'h-'+Date.now()+'-'+i,cid:'hybrid-'+i,text:t.substring(0,35)+'…',src:'hybrid',ts:Date.now()});}});
  toast('\u{1F9EC} 杂交结果已保存');loadSaved();
}

// ===== Tree =====
function renderTree(){
  document.getElementById('tree-nodes').textContent=S.saved.length;
  document.getElementById('tree-depth').textContent=Math.min(S.saved.length,5);
  var v=document.getElementById('tree-viz');
  if(S.saved.length===0){v.innerHTML='<span style="color:var(--muted)">保存灵感种子后，进化树会生长</span>';return;}
  v.innerHTML=S.saved.map(function(s,i){return (i>0?' → ':'')+(s.src==='hybrid'?'\u{1F9EC}':'\u{1F331}')+s.text.substring(0,10);}).join('');
}
function renderEvo(){
  var cnt=S.saved.filter(function(s){return s.src==='hybrid';}).length;
  document.getElementById('tree-logs').textContent=cnt;
  var l=document.getElementById('evo-logs');
  l.innerHTML=cnt>0?'<div class="log-entry">杂交产生了 '+cnt+' 个新种子</div>':'<div class="log-entry">暂无孵化日志</div>';
}
</script>
</body>
</html>
