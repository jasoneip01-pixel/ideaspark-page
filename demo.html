<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>✨ 灵感火花 — 互动DEMO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0221;--card:#1A0533;--primary:#7B2D8E;--cyan:#00D4FF;--green:#00E676;--text:#F5F5F5;--muted:#B0B0B0;--nav-h:64px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
html{height:-webkit-fill-available}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;overflow:hidden;height:100vh;height:-webkit-fill-available;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
/* ===== Layout ===== */
.app-wrap{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;padding-top:var(--safe-t);padding-bottom:calc(var(--safe-b) + var(--nav-h))}
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px;scroll-behavior:smooth}
main::-webkit-scrollbar{display:none}
/* ===== App Bar ===== */
.app-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;padding-top:calc(10px + var(--safe-t));flex-shrink:0}
.app-bar .title{font-size:clamp(16px,4.5vw,22px);font-weight:700;background:linear-gradient(135deg,var(--cyan),#7B2D8E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-bar .badge{background:linear-gradient(135deg,var(--primary),#5A1F6E);padding:4px 12px;border-radius:14px;font-size:clamp(10px,2.5vw,12px);color:white;white-space:nowrap}
/* ===== Screens ===== */
.screen{display:none;padding-bottom:16px}
.screen.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ===== Bottom Nav ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:6px 0;padding-bottom:calc(6px + var(--safe-b));background:rgba(13,2,33,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(123,45,142,0.15);z-index:50;height:calc(var(--nav-h) + var(--safe-b))}
.nav-item{text-align:center;cursor:pointer;color:var(--muted);font-size:clamp(9px,2.2vw,11px);padding:4px 8px;border-radius:10px;transition:color .2s,background .2s;touch-action:manipulation}
.nav-item.active{color:var(--cyan)}
.nav-item .icon{font-size:clamp(18px,5vw,24px);margin-bottom:2px;line-height:1}
.nav-item .lbl{line-height:1}
/* ===== Input Screen ===== */
.input-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 180px);padding:20px 0}
.input-area h1{font-size:clamp(28px,8vw,48px);background:linear-gradient(135deg,var(--primary),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.input-area .sub{color:var(--muted);margin-bottom:24px;font-size:clamp(13px,3vw,16px)}
.input-area textarea{width:100%;max-width:480px;background:var(--card);border:1px solid rgba(123,45,142,0.2);border-radius:16px;padding:clamp(14px,3.5vw,20px);font-size:clamp(15px,3.5vw,18px);color:var(--text);resize:none;height:clamp(100px,20vw,160px);font-family:inherit;transition:border-color .2s}
.input-area textarea:focus{outline:none;border-color:var(--cyan)}
.input-area textarea::placeholder{color:var(--muted);opacity:0.4}
.mutation-row{width:100%;max-width:480px;display:flex;align-items:center;gap:12px;margin:20px auto}
.mutation-row span{font-size:clamp(12px,2.8vw,14px);color:var(--muted);white-space:nowrap}
.mutation-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:linear-gradient(to right,var(--primary),var(--cyan))}
.mutation-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:clamp(18px,4.5vw,24px);height:clamp(18px,4.5vw,24px);border-radius:50%;background:var(--cyan);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 8px rgba(0,212,255,0.4)}
.mutation-val{color:var(--cyan);font-size:clamp(13px,3vw,16px);font-weight:600;text-align:center;margin-bottom:24px}
/* ===== Buttons ===== */
.btn-primary{display:block;width:100%;max-width:480px;margin:0 auto;padding:clamp(14px,3.5vw,18px);background:linear-gradient(135deg,var(--primary),#5A1F6E);border:none;border-radius:clamp(14px,3.5vw,18px);color:white;font-size:clamp(15px,3.5vw,18px);font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s;touch-action:manipulation}
.btn-primary:active{transform:scale(0.97);opacity:0.9}
.btn-sm{padding:clamp(8px,2vw,12px) clamp(16px,4vw,24px);border-radius:12px;font-size:clamp(13px,3vw,15px);border:none;color:white;cursor:pointer;touch-action:manipulation}
.btn-secondary{background:rgba(123,45,142,0.3);border:1px solid rgba(123,45,142,0.4)}
.btn-cyan{background:var(--cyan);color:var(--bg);font-weight:600}
/* ===== Swipe ===== */
.theme-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px}
.theme-header .back{color:var(--muted);cursor:pointer;padding:6px 4px;font-size:clamp(13px,3vw,15px)}
.theme-header .label{font-size:clamp(15px,3.5vw,18px);font-weight:600}
.theme-header .count{color:var(--muted);font-size:clamp(12px,2.8vw,14px)}
.card-area{display:flex;justify-content:center;align-items:center;min-height:clamp(320px,75vw,440px);padding:8px 0;position:relative}
.card-stack{position:relative;width:100%;max-width:clamp(300px,75vw,400px);min-height:clamp(280px,65vw,380px)}
.card-demo{position:absolute;top:0;left:0;right:0;background:var(--card);border-radius:clamp(16px,4vw,22px);padding:clamp(24px,5vw,36px) clamp(20px,4.5vw,32px);border:1.5px solid rgba(123,45,142,0.25);min-height:clamp(260px,60vw,360px);display:flex;flex-direction:column;will-change:transform;backface-visibility:hidden}
.card-demo.top{z-index:3;transform:translateY(0) scale(1);opacity:1}
.card-demo.mid{z-index:2;transform:translateY(clamp(6px,1.5vw,10px)) scale(0.96);opacity:0.6}
.card-demo.bot{z-index:1;transform:translateY(clamp(12px,3vw,20px)) scale(0.92);opacity:0.35}
.card-demo .tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:clamp(10px,2.5vw,12px);margin-bottom:clamp(12px,3vw,20px);color:white;width:fit-content;flex-shrink:0}
.card-demo .content{flex:1;font-size:clamp(15px,3.5vw,19px);line-height:1.7;color:var(--text);text-align:center;display:flex;align-items:center;justify-content:center}
.card-demo .hook{font-size:clamp(12px,2.8vw,14px);color:var(--cyan);font-style:italic;text-align:center;opacity:0.7;margin-top:auto;padding-top:12px;flex-shrink:0}
.card-demo.swiping{transition:none;box-shadow:0 0 40px rgba(0,212,255,0.15);cursor:grabbing}
.card-demo.like{transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s!important;border-color:var(--green)!important;transform:translateX(100vw) rotate(15deg)!important;opacity:0!important}
.card-demo.dislike{transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s!important;border-color:#ff4444!important;transform:translateX(-100vw) rotate(-15deg)!important;opacity:0!important}
.card-demo.mutate{transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s!important;border-color:var(--primary)!important;transform:scale(0.3) rotate(360deg)!important;opacity:0!important}
.card-demo .swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:clamp(13px,3vw,16px);font-weight:700;padding:6px 14px;border-radius:8px;opacity:0;transition:opacity .15s;pointer-events:none}
.card-demo .swipe-hint.like-hint{right:12px;color:var(--green);background:rgba(0,230,118,0.1)}
.card-demo .swipe-hint.nope-hint{left:12px;color:#ff4444;background:rgba(255,68,68,0.1)}
.swipe-buttons{display:flex;justify-content:center;align-items:center;gap:clamp(24px,8vw,50px);padding:16px 0 8px}
.swipe-btn{width:clamp(52px,14vw,68px);height:clamp(52px,14vw,68px);border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5.5vw,28px);cursor:pointer;background:rgba(0,0,0,0.3);transition:transform .15s;touch-action:manipulation;will-change:transform}
.swipe-btn:active{transform:scale(0.88)}
.swipe-btn.close{border-color:#ff4444;color:#ff4444}
.swipe-btn.heart{border-color:var(--green);color:var(--green)}
.swipe-btn.mutate{border-color:var(--primary);color:var(--primary);width:clamp(42px,11vw,56px);height:clamp(42px,11vw,56px);font-size:clamp(14px,3.5vw,18px)}
.swipe-hint-text{text-align:center;font-size:clamp(11px,2.5vw,13px);color:var(--muted);opacity:0.5;padding-bottom:8px}
/* ===== Saved ===== */
.saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.saved-header h3{font-size:clamp(16px,3.5vw,20px)}
.saved-header .hint{color:var(--muted);font-size:clamp(11px,2.5vw,13px)}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(140px,40vw,180px),1fr));gap:clamp(8px,2vw,14px)}
.saved-card{background:var(--card);border-radius:14px;padding:14px;min-height:110px;position:relative;cursor:pointer;border:1.5px solid transparent;transition:border-color .2s,transform .15s;touch-action:manipulation}
.saved-card:active{transform:scale(0.97)}
.saved-card.selected{border-color:var(--cyan);background:rgba(0,212,255,0.06)}
.saved-card .source{font-size:10px;padding:2px 7px;border-radius:4px;position:absolute;top:8px;left:8px;color:white}
.saved-card .source.swipe{background:rgba(0,230,118,0.3);color:var(--green)}
.saved-card .source.hybrid{background:rgba(123,45,142,0.3);color:#B47CE8}
.saved-card .text{font-size:clamp(12px,2.8vw,14px);line-height:1.5;margin-top:16px;color:var(--text)}
/* ===== Hybrid ===== */
.hybrid-area{padding:8px 0}
.hybrid-area .pick-row{display:flex;gap:clamp(8px,2vw,16px);margin-bottom:16px}
.hybrid-slot{flex:1;background:var(--card);border-radius:14px;padding:clamp(16px,4vw,24px);text-align:center;cursor:pointer;border:1.5px dashed rgba(123,45,142,0.35);min-height:clamp(80px,20vw,120px);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .2s}
.hybrid-slot:active{border-color:var(--cyan)}
.hybrid-slot.filled{border-style:solid;border-color:var(--cyan);background:rgba(0,212,255,0.04)}
.hybrid-slot .label{color:var(--muted);font-size:clamp(11px,2.5vw,13px);margin-bottom:6px}
.hybrid-slot .preview{font-size:clamp(12px,2.8vw,14px);color:var(--text);line-height:1.3}
.hybrid-anim{position:fixed;top:50%;left:50%;width:clamp(60px,15vw,90px);height:clamp(60px,15vw,90px);transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,var(--primary),var(--cyan));border-radius:50%;z-index:99;pointer-events:none;opacity:0}
.hybrid-anim.boom{animation:boom .6s ease forwards}
@keyframes boom{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-50%) scale(20);opacity:0.7}100%{transform:translate(-50%,-50%) scale(25);opacity:0}}
.result-card{background:rgba(123,45,142,0.15);border-radius:16px;padding:clamp(16px,4vw,24px);border:1px solid rgba(123,45,142,0.3);margin-top:16px;display:none;animation:fadeIn .35s ease}
.result-card.visible{display:block}
.result-card .title{color:var(--cyan);font-weight:600;margin-bottom:12px;font-size:clamp(13px,3vw,16px)}
.result-card .hybrid-text{font-size:clamp(14px,3.2vw,17px);line-height:1.7;color:var(--text);margin-bottom:12px}
.result-card .explain{font-size:clamp(12px,2.8vw,14px);color:var(--muted);background:var(--bg);padding:clamp(10px,2.5vw,14px);border-radius:8px;margin-bottom:8px}
.result-card .wow{font-size:clamp(12px,2.8vw,14px);color:var(--cyan);font-style:italic;margin-bottom:12px}
/* ===== Questions ===== */
.chain-area{padding:8px 0 4px;max-height:clamp(300px,70vh,500px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.chain-area::-webkit-scrollbar{display:none}
.msg-row{display:flex;gap:clamp(6px,1.5vw,10px);margin-bottom:14px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.msg-bubble{max-width:85%;padding:clamp(10px,2.5vw,16px) clamp(14px,3.5vw,20px);border-radius:clamp(10px,2.5vw,14px);font-size:clamp(13px,3vw,16px);line-height:1.6;word-break:break-word}
.msg-row.ai .msg-bubble{background:var(--card);border-top-left-radius:4px}
.msg-row.user .msg-bubble{background:rgba(0,212,255,0.12);border-top-right-radius:4px}
.msg-row .avatar{width:clamp(26px,6vw,32px);height:clamp(26px,6vw,32px);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.5vw,13px);font-weight:600;flex-shrink:0}
.msg-row.ai .avatar{background:linear-gradient(135deg,var(--primary),#5A1F6E);color:white}
.msg-row.user .avatar{background:linear-gradient(135deg,var(--cyan),#0088AA);color:white}
.msg-type{font-size:clamp(9px,2.2vw,11px);color:var(--cyan);margin-top:4px;opacity:0.5}
.chat-input{display:flex;gap:8px;margin-top:10px;padding:4px 0;flex-shrink:0}
.chat-input input{flex:1;background:var(--card);border:1px solid rgba(123,45,142,0.2);border-radius:12px;padding:clamp(10px,2.5vw,14px);color:var(--text);font-size:clamp(14px,3.2vw,16px);outline:none;transition:border-color .2s;min-width:0}
.chat-input input:focus{border-color:var(--cyan)}
.chat-input button{background:var(--primary);border:none;border-radius:12px;padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,18px);color:white;font-size:clamp(13px,3vw,15px);cursor:pointer;white-space:nowrap;touch-action:manipulation}
.chat-input button:active{opacity:0.8}
.chain-complete{background:rgba(0,230,118,0.08);border-radius:16px;padding:clamp(16px,4vw,24px);border:1px solid rgba(0,230,118,0.2);text-align:center;margin-bottom:12px}
.chain-complete .emoji{font-size:clamp(28px,7vw,42px);margin-bottom:6px}
.chain-complete .msg{color:var(--text);font-size:clamp(14px,3.2vw,17px);font-weight:600}
.chain-complete .sub{color:var(--muted);font-size:clamp(12px,2.8vw,14px);margin-top:4px}
/* ===== Tree ===== */
.tree-info{display:flex;justify-content:space-around;background:var(--card);border-radius:14px;padding:clamp(10px,2.5vw,16px);margin-bottom:12px}
.tree-info div{text-align:center}
.tree-info .num{color:var(--cyan);font-size:clamp(18px,4.5vw,24px);font-weight:700}
.tree-info .lbl{color:var(--muted);font-size:clamp(10px,2.4vw,12px)}
.tree-viz{position:relative;width:100%;height:clamp(320px,75vw,450px);overflow:hidden;margin-bottom:12px;background:radial-gradient(ellipse at 50% 20%, rgba(123,45,142,0.08) 0%, transparent 70%);border-radius:14px}
/* ===== Evolution Logs ===== */
.log-item{background:var(--card);padding:clamp(10px,2.5vw,14px);border-radius:12px;margin-bottom:8px;border:1px solid rgba(123,45,142,0.08)}
.log-item .head{display:flex;justify-content:space-between;margin-bottom:4px;font-size:clamp(11px,2.5vw,12px)}
.log-item .action-tag{padding:2px 8px;border-radius:6px;font-weight:500}
.log-item .action-tag.questioned{background:rgba(0,212,255,0.15);color:var(--cyan)}
.log-item .action-tag.refined{background:rgba(123,45,142,0.15);color:#B47CE8}
.log-item .action-tag.hybridized{background:rgba(255,165,0,0.15);color:#FFA500}
.log-item .card-name{color:var(--muted)}
.log-item .desc{font-size:clamp(12px,2.8vw,14px);color:var(--text);line-height:1.5}
/* ===== Empty State ===== */
.empty-state{padding:clamp(30px,8vw,60px) 0;text-align:center;color:var(--muted);font-size:clamp(13px,3vw,16px)}
.empty-state .big{font-size:clamp(40px,10vw,60px);margin-bottom:12px}
/* ===== Modal ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal-overlay.visible{display:flex}
.modal-content{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:clamp(16px,4vw,24px);max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-content h3{color:var(--text);margin-bottom:14px;font-size:clamp(15px,3.5vw,18px)}
.modal-content .handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 14px}
.modal-list{display:flex;flex-direction:column;gap:6px}
.modal-item{background:var(--bg);padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,18px);border-radius:10px;cursor:pointer;font-size:clamp(13px,3vw,15px);color:var(--text);transition:background .15s;touch-action:manipulation}
.modal-item:active{background:var(--primary)}
/* ===== Snack ===== */
.snack{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%);background:rgba(0,230,118,0.12);color:var(--green);padding:clamp(8px,2vw,12px) clamp(20px,5vw,32px);border-radius:20px;font-size:clamp(13px,3vw,15px);z-index:200;border:1px solid rgba(0,230,118,0.2);backdrop-filter:blur(10px);pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.snack.show{opacity:1}
/* ===== Tablet overrides ===== */
@media(min-width:600px){
  .input-area{min-height:unset;padding:clamp(40px,10vh,80px) 0}
  .input-area textarea{height:clamp(80px,15vw,120px)}
  .saved-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .hybrid-area .pick-row{max-width:500px;margin-left:auto;margin-right:auto}
  .result-card{max-width:500px;margin-left:auto;margin-right:auto}
  .tree-viz{height:clamp(350px,50vh,500px)}
  .chain-area{max-height:clamp(350px,60vh,500px)}
  .card-stack{max-width:clamp(340px,50vw,420px)}
  main{padding:0 24px}
}
@media(min-width:900px){
  .saved-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  main{padding:0 32px;max-width:720px;margin:0 auto}
  .card-stack{max-width:400px}
}
/* ===== Dark scrollbar ===== */
@media(hover:hover){
  main::-webkit-scrollbar{display:block;width:4px}
  main::-webkit-scrollbar-track{background:transparent}
  main::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}
}
</style>
</head>
<body>
<div class="app-wrap">
  <!-- App Bar -->
  <div class="app-bar">
    <div class="title">✨ 灵感火花</div>
    <div class="badge" id="badge-unread" onclick="showNav('evolution')">3 条孵化日志</div>
  </div>

  <main id="main-scroll">
    <!-- ===== Screen 0: Input ===== -->
    <div class="screen active" id="screen-input">
      <div class="input-area">
        <h1>灵感火花</h1>
        <div class="sub">碎片时间的灵感进化论</div>
        <div id="api-status" style="font-size:13px;margin-bottom:14px;color:var(--muted)">🔄 连接后端...</div>
        <textarea id="theme-input" placeholder="今天想什么方向？&#10;比如：解压玩具、失眠方案、猫咪产品…">解压玩具</textarea>
        <div class="mutation-row">
          <span>靠谱</span>
          <input type="range" id="mutation-slider" min="1" max="100" value="50">
          <span>狂想</span>
        </div>
        <div class="mutation-val" id="mutation-val">脑洞指数: 50</div>
        <button class="btn-primary" onclick="startSwipe()">🎴 开始发牌</button>
      </div>
    </div>

    <!-- ===== Screen 1: Swipe ===== -->
    <div class="screen" id="screen-swipe">
      <div class="theme-header">
        <span class="back" onclick="backToInput()">← 换主题</span>
        <span class="label" id="theme-label">解压玩具</span>
        <span class="count" id="card-count">0 张</span>
      </div>
      <div class="card-area">

const API_BASE = 'https://0267a8c915f3ed.lhr.life/api/v1';

// Auto-register + login
async function initAPI() {
  const phone = 'demo_user_' + Date.now();
  const pass = 'demo123';
  try {
    // Register
    let r = await fetch(API_BASE + '/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, password: pass})
    });
    if (!r.ok) {
      // Already registered — login instead
      r = await fetch(API_BASE + '/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({phone, password: pass})
      });
    }
    const data = await r.json();
    API_AUTH.token = data.access_token;
    API_AUTH.userId = data.user?.id;
    return true;
  } catch(e) {
    console.warn('API init failed:', e);
    return false; // fall back to mock
  }
}

// Create a theme if not exists
async function ensureTheme(themeTitle, mutationRate) {
  if (!API_AUTH.token) return null;
  try {
    // List themes
    let r = await fetch(API_BASE + '/themes', {
      headers: {'Authorization': 'Bearer ' + API_AUTH.token}
    });
    const themes = await r.json();
    const existing = themes.find(t => t.title === themeTitle);
    if (existing) {
      API_AUTH.themes[themeTitle] = existing.id;
      return existing;
    }
    // Create new
    r = await fetch(API_BASE + '/themes', {
      method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + API_AUTH.token},
      body: JSON.stringify({title: themeTitle, mutation_rate: mutationRate, description: '从灵感火花Demo创建'})
    });
    const theme = await r.json();
    API_AUTH.themes[themeTitle] = theme.id;
    return theme;
  } catch(e) {
    console.warn('ensureTheme failed:', e);
    return null;
  }
}

// Generate cards via AI backend (returns one card per call)
let _apiCardSeq = 0;
async function generateCardsViaAPI(themeTitle, mutationRate) {
  if (!API_AUTH.token) return null;
  const themeId = API_AUTH.themes[themeTitle];
  if (!themeId) return null;
  try {
    const r = await fetch(API_BASE + '/themes/' + themeId + '/cards/generate', {
      method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + API_AUTH.token},
      body: JSON.stringify({count: 1, mutation_rate: mutationRate})
    });
    if (!r.ok) return null;
    const card = await r.json();
    _apiCardSeq++;
    // Extract a short hook from content
    let hook = '';
    const hooks = card.content.match(/[，。！？]/);
    const firstPunct = card.content.indexOf('，');
    if (firstPunct > 0 && firstPunct < 25) hook = card.content.substring(0, firstPunct) + '…';
    else hook = card.content.length > 20 ? card.content.substring(0, 18) + '…' : card.content;
    return {
      id: 'ai-' + _apiCardSeq,
      content: card.content,
      type: card.card_type === 'fusion' ? 'fusion' : card.card_type === 'wild' ? 'wild' : 'practical',
      hook: hook
    };
  } catch(e) {
    console.warn('generateCardsViaAPI failed:', e);
    return null;
  }
}

  // Ensure API theme exists for this topic
  if (API_AUTH.token && !API_AUTH.themes[theme]) {
    await ensureTheme(theme, S.mutationRate);
  }
  
  // Generate 1 AI card + fill rest with mock
  let pool = [...MOCK.cards];
  if (API_AUTH.token) {
    const aiCard = await generateCardsViaAPI(theme, S.mutationRate);
    if (aiCard) {
      // Replace first mock card with AI card
      pool[0] = aiCard;
      statusEl.textContent = '🟢 真AI在线';
    } else {
      statusEl.textContent = '🟡 离线模式（Mock数据）';
    }
  } else {
    statusEl.textContent = '🟡 离线模式（Mock数据）';
  }
  
  S.cardPool = pool;
  S.cardPoolIdx = 0;
  S.cards = [];
  dealCards(3);
  showNav('swipe');
}

async function initCards(){
  // Try backend AI first for one card
  let pool = [...MOCK.cards];
  if (API_AUTH.token) {
    const aiCard = await generateCardsViaAPI(S.currentTheme, S.mutationRate);
    if (aiCard) pool[0] = aiCard;
  }
  S.cardPool = pool;
  S.cardPoolIdx=0;
  S.cards=[];
  dealCards(3);
}

function dealCards(n){
  if(S.cardPool.length===0)return;
  for(let i=0;i<n;i++){
    const idx=S.cardPoolIdx%S.cardPool.length;
    S.cards.push({...S.cardPool[idx],uniqueId:`c-${Date.now()}-${i}`});
    S.cardPoolIdx++;
  }
  renderCards();
}

function getTopCard(){return S.cards.find(c=>!c.removed);}

function renderCards(){
  const stack=document.getElementById('card-stack');
  const visible=S.cards.filter(c=>!c.removed);
  if(visible.length===0){
    if(S.cardPoolIdx<50){
      dealCards(3);return;
    }
    stack.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted);font-size:16px">
      🃏 本轮卡牌已发完<br><span style="font-size:13px">收藏了 <strong>${S.saved.length}</strong> 张灵感种子</span>
    </div>`;
    return;
  }
  const colors={practical:'rgba(0,100,255,0.5)',fusion:'rgba(123,45,142,0.5)',wild:'rgba(255,165,0,0.5)'};
  const labels={practical:'务实',fusion:'跨界',wild:'狂想'};
  stack.innerHTML=visible.map((c,i)=>{
    const pos=i===0?'top':i===1?'mid':i===2?'bot':'hidden';
    return `<div class="card-demo ${pos}" data-id="${c.uniqueId}" style="background:${c.removed?'transparent':''}">
      <span class="tag ${c.type}" style="background:${colors[c.type]||'rgba(0,100,255,0.5)'}">${labels[c.type]||'创意'}</span>
      <span class="swipe-hint like-hint" id="hint-like-${c.uniqueId}">♥ 留种</span>
      <span class="swipe-hint nope-hint" id="hint-nope-${c.uniqueId}">✕ 淘汰</span>
      <div class="content">${c.content}</div>
      ${c.hook?`<div class="hook">✨ ${c.hook}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('card-count').textContent=`${visible.length} 张`;
  if(S.cards.length>=5){
    const st=document.getElementById('stats-bar');
    st.style.display='block';
    document.getElementById('saved-count-stats').textContent=S.saved.length;
  }
  // Attach touch/mouse on top card
  const top=stack.querySelector('.card-demo.top');
  if(top){
    top.addEventListener('touchstart',touchStart,{passive:true});
    top.addEventListener('touchmove',touchMove,{passive:false});
    top.addEventListener('touchend',touchEnd,{passive:false});
    top.addEventListener('mousedown',mouseDown);
    top.addEventListener('mousemove',mouseMove);
    top.addEventListener('mouseup',mouseUp);
    top.addEventListener('mouseleave',mouseUp);
  }
}

// ----- Swipe Gesture -----
function touchStart(e){const t=e.touches[0];S.startX=t.clientX;S.isDragging=true;S.swiping=false;S.currentEl=getTopCardEl();if(S.currentEl){S.currentEl.classList.add('swiping');}}
function touchMove(e){if(!S.isDragging||!S.currentEl)return;e.preventDefault();const t=e.touches[0];const dx=t.clientX-S.startX;if(Math.abs(dx)>8)S.swiping=true;S.offsetX=dx;S.currentEl.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;showHints(dx);}
function touchEnd(e){if(!S.currentEl){S.isDragging=false;return;}
  S.currentEl.classList.remove('swiping');
  if(S.swiping&&S.offsetX>70)doSwipe('right',S.currentEl);
  else if(S.swiping&&S.offsetX<-70)doSwipe('left',S.currentEl);
  else resetCard(S.currentEl);
  S.isDragging=false;S.swiping=false;S.currentEl=null;S.offsetX=0;
}
function mouseDown(e){S.startX=e.clientX;S.isDragging=true;S.swiping=false;S.currentEl=getTopCardEl();if(S.currentEl)S.currentEl.classList.add('swiping');}
function mouseMove(e){if(!S.isDragging||!S.currentEl)return;const dx=e.clientX-S.startX;if(Math.abs(dx)>8)S.swiping=true;S.offsetX=dx;S.currentEl.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;showHints(dx);}
function mouseUp(e){if(!S.currentEl){S.isDragging=false;return;}
  S.currentEl.classList.remove('swiping');
  if(S.swiping&&S.offsetX>70)doSwipe('right',S.currentEl);
  else if(S.swiping&&S.offsetX<-70)doSwipe('left',S.currentEl);
  else resetCard(S.currentEl);
  S.isDragging=false;S.swiping=false;S.currentEl=null;S.offsetX=0;
}
function getTopCardEl(){return document.querySelector('.card-demo.top');}
function showHints(dx){
  const top=getTopCardEl();if(!top)return;
  const lh=top.querySelector('.swipe-hint.like-hint');const nh=top.querySelector('.swipe-hint.nope-hint');
  if(dx>20){lh.style.opacity='1';nh.style.opacity='0';top.style.borderColor='var(--green)';}
  else if(dx<-20){lh.style.opacity='0';nh.style.opacity='1';top.style.borderColor='#ff4444';}
  else{lh.style.opacity='0';nh.style.opacity='0';top.style.borderColor='';}
}
function resetCard(el){el.style.transform='';el.style.borderColor='';const lh=el.querySelector('.swipe-hint.like-hint');const nh=el.querySelector('.swipe-hint.nope-hint');if(lh)lh.style.opacity='0';if(nh)nh.style.opacity='0';}

function swipeLeft(){const el=getTopCardEl();if(el)doSwipe('left',el);}
function swipeRight(){const el=getTopCardEl();if(el)doSwipe('right',el);}
function swipeMutate(){const el=getTopCardEl();if(el)doSwipe('mutate',el);}

function doSwipe(dir,el){
  if(!el)return;
  const card=S.cards.find(c=>c.uniqueId===el.dataset.id);
  if(!card)return;
  
  if(dir==='left'){el.classList.add('dislike');card.removed=true;showSnack('⏭ 已跳过');}
  else if(dir==='right'){
    el.classList.add('like');
    if(!S.saved.find(s=>s.card_id===card.id)){
      S.saved.push({id:'s'+Date.now(),card_id:card.id,card_content:card.content.substring(0,30)+'…',source:'swipe'});
      updateBadge();
    }
    card.removed=true;showSnack('✨ 留种成功！');
  }
  else if(dir==='mutate'){
    el.classList.add('mutate');
    const mut={...card,uniqueId:card.uniqueId+'-mut',content:card.content+' 更进一步：把它的核心机制拆出来，反向使用。',hook:card.hook+'·反向'};
    S.cards.push(mut);
    card.removed=true;showSnack('⚡ 突变！');
  }
  setTimeout(renderCards,350);
}

function updateBadge(){
  const b=document.getElementById('badge-unread');
  const n=S.saved.length;
  b.textContent=n>0?`${n} 颗种子`:'暂无种子';
  document.getElementById('saved-count-label').textContent=`${n} 张`;
}

function showSnack(msg){
  const s=document.getElementById('snack');
  s.textContent=msg;s.classList.add('show');
  clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('show'),1400);
}

function backToInput(){showNav('input');}

// ===== Saved =====
function loadSaved(){
  const grid=document.getElementById('saved-grid');
  const empty=document.getElementById('saved-empty');
  if(S.saved.length===0){empty.style.display='block';grid.innerHTML='';return;}
  empty.style.display='none';
  grid.innerHTML=S.saved.map(s=>{
    const isSel=S.hybridCards.a===s.id||S.hybridCards.b===s.id;
    const src=s.source||'swipe';
    return `<div class="saved-card ${isSel?'selected':''}" onclick="toggleSavedSelect('${s.id}')">
      <span class="source ${src}" style="background:${src==='hybrid'?'rgba(123,45,142,0.3)':'rgba(0,230,118,0.3)'}">${src==='swipe'?'右滑':'杂交'}</span>
      <div class="text">${s.card_content}</div>
    </div>`;
  }).join('');
  updateHybridBtn();
}

function toggleSavedSelect(id){
  if(S.hybridCards.a===id)S.hybridCards.a=null;
  else if(S.hybridCards.b===id)S.hybridCards.b=null;
  else if(!S.hybridCards.a)S.hybridCards.a=id;
  else if(!S.hybridCards.b)S.hybridCards.b=id;
  else return;
  loadSaved();
}

function updateHybridBtn(){
  const btn=document.getElementById('hybrid-btn-area');
  btn.style.display=S.hybridCards.a&&S.hybridCards.b?'block':'none';
}

// ===== Hybrid =====
function goHybrid(){
  showNav('hybrid');
  const getC=(id)=>S.saved.find(s=>s.id===id);
  const a=getC(S.hybridCards.a);const b=getC(S.hybridCards.b);
  if(a){document.getElementById('slot-a').classList.add('filled');document.getElementById('slot-a-text').textContent=a.card_content.substring(0,18)+'…';}
  if(b){document.getElementById('slot-b').classList.add('filled');document.getElementById('slot-b-text').textContent=b.card_content.substring(0,18)+'…';}
}
function pickCard(slot){
  S._pickSlot=slot;
  const l=document.getElementById('pick-modal-list');
  document.getElementById('pick-modal-title').textContent=`选择卡片 ${slot.toUpperCase()}`;
  l.innerHTML=S.saved.map(s=>`<div class="modal-item" onclick="selectCard('${slot}','${s.id}','${s.card_content.replace(/'/g,"\\'")}')">${s.card_content}</div>`).join('');
  document.getElementById('pick-modal').classList.add('visible');
}
function selectCard(slot,id,content){
  S.hybridCards[slot]=id;
  const slotEl=document.getElementById(`slot-${slot}`);
  slotEl.classList.add('filled');
  document.getElementById(`slot-${slot}-text`).textContent=content.substring(0,18)+'…';
  document.getElementById('pick-modal').classList.remove('visible');
  updateHybridBtn();
}
function doHybrid(){
  if(!S.hybridCards.a||!S.hybridCards.b)return;
  const anim=document.getElementById('hybrid-anim');
  anim.classList.remove('boom');void anim.offsetWidth;anim.classList.add('boom');
  setTimeout(()=>{
    const pa = S.saved.find(s=>s.id===S.hybridCards.a);
    const pb = S.saved.find(s=>s.id===S.hybridCards.b);
    const ca = MOCK.cards.find(c=>c.id===(pa?pa.card_id:''));
    const cb = MOCK.cards.find(c=>c.id===(pb?pb.card_id:''));
    const ha = (ca&&ca.hook)||'';
    const hb = (cb&&cb.hook)||'';
    let best = MOCK.hybrids[0], bestScore = 0;
    for(const hh of MOCK.hybrids){
      let sc = 0;
      if(ha&&(hh.result.includes(ha)||hh.explain.includes(ha))) sc+=3;
      if(hb&&(hh.result.includes(hb)||hh.explain.includes(hb))) sc+=3;
      if(pa&&(hh.parent1===pa.id||hh.parent2===pa.id)) sc+=2;
      if(pb&&(hh.parent1===pb.id||hh.parent2===pb.id)) sc+=2;
      if(sc>bestScore){bestScore=sc;best=hh;}
    }
    document.getElementById('hybrid-text').textContent=best.result;
    document.getElementById('hybrid-explain').textContent='🧬 '+best.explain;
    document.getElementById('hybrid-wow').textContent='✨ 最意外的元素：'+best.wow;
    document.getElementById('hybrid-result').classList.add('visible');
    document.getElementById('hybrid-result').scrollIntoView({behavior:'smooth'});
    S.saved.push({id:'s-hybrid-'+Date.now(),card_id:'hybrid-'+Date.now(),card_content:best.result.substring(0,25)+'…',source:'hybrid'});
    updateBadge();
  },600);
}

// ===== Questions =====
function startQuestionChain(){
  showNav('questions');
  S.chainData=JSON.parse(JSON.stringify(MOCK.question_chain));
  S.chainActive=true;S.chainRounds=[];
  document.getElementById('chat-input-area').style.display='flex';
  document.getElementById('chain-area').innerHTML='';
  askNext();
}
function askNext(){
  if(!S.chainData)return;
  const idx=S.chainRounds.length;
  const rounds=S.chainData.rounds;
  if(idx>=rounds.length){
    document.getElementById('chain-area').innerHTML+=`<div class="chain-complete">
      <div class="emoji">✅</div><div class="msg">追问链完成！</div>
      <div class="sub">AI 会在后台继续孵化你的点子</div></div>`;
    document.getElementById('chat-input-area').style.display='none';
    S.chainActive=false;
    return;
  }
  const q=rounds[idx];
  const tl={feasibility:'⚡可行性',user_pain:'🎯用户痛点',market:'📊市场验证',edge_case:'⚠️边界',personal:'💭动机'};
  document.getElementById('chain-area').innerHTML+=`<div class="msg-row ai">
    <div class="avatar">AI</div><div>
    <div class="msg-bubble">${q.q}</div>
    <div class="msg-type">${tl[q.type]||q.type} · 第${idx+1}/${rounds.length}轮</div></div></div>`;
  document.getElementById('chain-area').scrollTop=document.getElementById('chain-area').scrollHeight;
}
function sendAnswer(){
  const input=document.getElementById('chat-answer');
  const a=input.value.trim();if(!a)return;input.value='';
  const idx=S.chainRounds.length;
  const rounds=S.chainData?.rounds||[];
  if(idx>=rounds.length)return;
  document.getElementById('chain-area').innerHTML+=`<div class="msg-row user">
    <div class="msg-bubble">${a}</div>
    <div class="avatar">你</div></div>`;
  S.chainRounds.push({q:rounds[idx].q,answer:a});
  setTimeout(askNext,400);
}

// ===== Tree =====
function renderTree(){
  const nodes=MOCK.tree.nodes;
  document.getElementById('tree-nodes').textContent=nodes.length;
  document.getElementById('tree-depth').textContent=Math.max(...nodes.map(n=>n.depth))+1;
  document.getElementById('tree-logs').textContent=MOCK.logs.length;
  const viz=document.getElementById('tree-viz');viz.innerHTML='';
  const byDepth={};nodes.forEach(n=>{(byDepth[n.depth]=byDepth[n.depth]||[]).push(n);});
  const cw=viz.clientWidth||300;
  const ch=viz.clientHeight||380;
  const cx=cw/2;
  const sy=30;
  const sw=clamp(cw-80,200,600);
  const sh=clamp(ch-60,200,500);
  Object.keys(byDepth).sort().forEach(d=>{
    d=parseInt(d);
    const group=byDepth[d];
    const sx=Math.min(140,sw/(group.length+1));
    group.forEach((node,i)=>{
      const x=cx-((group.length-1)*sx)/2+i*sx;
      const y=sy+d*(sh/(Math.max(...Object.keys(byDepth).map(Number))+1));
      const dot=document.createElement('div');
      dot.className='tree-node';dot.style.cssText=`position:absolute;width:70px;text-align:center;left:${x-35}px;top:${y}px`;
      dot.innerHTML=`<div style="width:clamp(16px,4vw,24px);height:clamp(16px,4vw,24px);border-radius:50%;margin:0 auto 4px;background:${node.type==='seed'?'var(--green)':node.type==='hybrid'?'var(--primary)':'var(--cyan)'}"></div>
      <div style="font-size:clamp(9px,2.2vw,11px);color:var(--muted);line-height:1.2">${node.label}</div>`;
      viz.appendChild(dot);
      if(node.parent){
        const pn=nodes.find(n=>n.id===node.parent);
        if(pn){
          const pg=byDepth[pn.depth];const pi=pg.indexOf(pn);
          const psx=Math.min(140,sw/(pg.length+1));
          const px=cx-((pg.length-1)*psx)/2+pi*psx;
          const py=sy+pn.depth*(sh/(Math.max(...Object.keys(byDepth).map(Number))+1))+16;
          const dx=x-px,dy=y-(py+12);
          const len=Math.sqrt(dx*dx+dy*dy);
          const angle=Math.atan2(dy,dx)*180/Math.PI;
          const line=document.createElement('div');
          line.style.cssText=`position:absolute;height:2px;background:rgba(123,45,142,0.25);transform-origin:left center;width:${len}px;left:${px}px;top:${py+12}px;transform:rotate(${angle}deg)`;
          viz.appendChild(line);
        }
      }
    });
  });
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function renderLogs(){
  const c=document.getElementById('evolution-logs');
  const al={questioned:'❓追问',refined:'🔧优化',hybridized:'🧬杂交'};
  c.innerHTML=MOCK.logs.map(l=>`<div class="log-item">
    <div class="head"><span class="action-tag ${l.action}">${al[l.action]||'进化'} G${l.gen}</span><span class="card-name">${l.card}</span></div>
    <div class="desc">${l.desc}</div></div>`).join('');
}

function goSaved(){showNav('saved');}

// ===== Navigation =====
function showNav(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  let targetId='screen-input';
  if(screen==='swipe')targetId=S.cards.some(c=>!c.removed)?'screen-swipe':'screen-input';
  else if(screen==='saved')targetId='screen-saved';
  else if(screen==='hybrid')targetId='screen-hybrid';
  else if(screen==='questions')targetId='screen-questions';
  else if(screen==='tree'||screen==='evolution')targetId='screen-tree';
  else if(screen==='input')targetId='screen-input';
  document.getElementById(targetId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const map={input:'input',swipe:'swipe',saved:'saved',hybrid:'hybrid',questions:'tree',tree:'tree',evolution:'tree'};
  const navKey=map[screen]||'input';
  document.querySelector(`.nav-item[data-screen="${navKey}"]`)?.classList.add('active');
  S.screen=targetId;
  
  // Refresh on navigation
  if(screen==='tree'||screen==='evolution'){renderTree();renderLogs();}
  if(screen==='saved')loadSaved();
  updateHybridBtn();
  if(screen==='questions'&&!S.chainActive){
    // If not in active chain, go back to tree
  }
  document.getElementById('main-scroll')?.scrollTo({top:0});
}
