<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>✨ 灵感火花</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0221;--card:#1A0533;--primary:#7B2D8E;--cyan:#00D4FF;--green:#00E676;--text:#F5F5F5;--muted:#B0B0B0;--nav-h:64px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{-webkit-font-smoothing:antialiased}
.app-wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:var(--nav-h)}
/* Top bar */
.top-bar{position:sticky;top:0;z-index:51;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;padding-top:calc(8px + var(--safe-t));background:rgba(13,2,33,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(123,45,142,0.15)}
.top-bar .avatar{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,212,255,0.4);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;background:rgba(0,212,255,0.08)}
.top-bar .user-name{color:var(--text);font-size:13px;margin-left:8px;white-space:nowrap}
.top-bar .title{font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--cyan),#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.top-bar .bell{font-size:18px;cursor:pointer;padding:4px}
/* Login screen */
.screen{display:none;padding:12px 16px;padding-bottom:calc(12px + var(--nav-h))}
.screen.active{display:block}
.login-screen{text-align:center;padding-top:24px}
.login-icon{font-size:64px;margin:16px 0}
.login-title{font-size:24px;font-weight:700;background:linear-gradient(90deg,var(--cyan),#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.login-name-input{width:100%;max-width:280px;padding:12px 16px;border-radius:12px;border:1px solid rgba(123,45,142,0.4);background:rgba(26,5,51,0.8);color:var(--text);font-size:15px;text-align:center;outline:none;margin-bottom:20px}
.login-name-input:focus{border-color:var(--cyan)}
.avatar-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:320px;margin:0 auto 24px}
.avatar-option{width:48px;height:48px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .2s;background:rgba(26,5,51,0.6)}
.avatar-option.selected{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.3)}
.btn-explore{display:inline-block;padding:14px 48px;border-radius:24px;border:none;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-explore:active{opacity:.85}
/* Sub nav */
.subnav{display:flex;gap:8px;padding:8px 0 12px}
.subnav button{flex:1;padding:8px;border-radius:10px;border:1px solid rgba(123,45,142,0.3);background:rgba(26,5,51,0.6);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.subnav button.active{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.4);color:var(--cyan)}
/* Card style */
.card-area{position:relative;height:360px;margin:8px 0;overflow:hidden}
.card-stack{position:relative;width:100%;height:100%}
.card{position:absolute;width:100%;height:100%;background:var(--card);border-radius:16px;padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid rgba(123,45,142,0.2);transition:transform .3s,opacity .3s;user-select:none;-webkit-user-select:none;touch-action:pan-y;font-size:16px}
.card .domain{font-size:11px;color:var(--cyan);margin-top:8px;background:rgba(0,212,255,0.1);padding:3px 10px;border-radius:10px}
.swipe-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
.swipe-buttons{display:flex;justify-content:center;gap:20px;margin-top:12px}
.swipe-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:transform .15s}
.swipe-btn:active{transform:scale(.9)}
.swipe-btn.close{background:rgba(255,68,68,0.15);color:#F44}
.swipe-btn.heart{background:rgba(0,230,118,0.15);color:var(--green)}
.swipe-btn.mutate{background:rgba(0,212,255,0.15);color:var(--cyan)}
/* Seeds */
.saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.saved-header h3{font-size:16px;color:var(--cyan)}
.empty-state{text-align:center;padding:32px 0;color:var(--muted);font-size:14px;line-height:1.8}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.btn-primary{display:block;width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}
.btn-primary:active{opacity:.85}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:6px 0;padding-bottom:calc(6px + var(--safe-b));background:rgba(13,2,33,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(123,45,142,0.15);z-index:50;height:calc(var(--nav-h) + var(--safe-b));max-width:480px;margin:0 auto}
.nav-item{text-align:center;cursor:pointer;color:var(--muted);font-size:10px;padding:4px 12px;border-radius:8px;transition:color .2s;touch-action:manipulation;flex:1}
.nav-item.active{color:var(--cyan)}
.nav-item .icon{font-size:22px;margin-bottom:1px;line-height:1}
.nav-item .lbl{line-height:1}
/* Hybrid */
.hybrid-area{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.pick-row{display:flex;gap:10px;width:100%}
.hybrid-slot{flex:1;min-height:80px;background:rgba(26,5,51,0.5);border:1px dashed rgba(123,45,142,0.4);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:10px}
.hybrid-slot.filled{border-style:solid;border-color:rgba(0,212,255,0.3)}
.hybrid-slot .label{font-size:11px;color:var(--muted);margin-bottom:4px}
.hybrid-slot .content{font-size:13px;text-align:center;word-break:break-word}
.result-card{width:100%;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:12px;padding:14px;margin-top:10px;text-align:center;font-size:14px}
.result-card .label{font-size:11px;color:var(--green);margin-bottom:4px}
/* Tree */
.tree-info{display:flex;gap:16px;justify-content:center;margin:12px 0}
.tree-info .stat{text-align:center}
.tree-info .num{font-size:24px;font-weight:700;color:var(--cyan)}
.tree-info .lbl{font-size:11px;color:var(--muted)}
.tree-viz{padding:12px;background:rgba(26,5,51,0.3);border-radius:12px;min-height:80px;margin:8px 0;font-size:13px;line-height:1.8}
/* Saved grid */
.saved-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.saved-card{background:var(--card);border-radius:10px;padding:10px;border:1px solid rgba(123,45,142,0.15);cursor:pointer;font-size:13px;position:relative}
.saved-card.selected{border-color:var(--cyan)}
.saved-card .check{position:absolute;top:6px;right:8px;font-size:16px}
.saved-card .fitness{font-size:10px;color:var(--green);margin-top:4px}
/* Arena placeholder */
.arena-placeholder{text-align:center;padding:32px 0;color:var(--muted)}
.arena-placeholder .icon{font-size:48px;margin-bottom:12px}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
/* Theme input */
.input-area h1{font-size:22px;background:linear-gradient(90deg,var(--cyan),#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.input-area .sub{font-size:14px;color:var(--muted);margin-bottom:20px}
#theme-input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(123,45,142,0.4);background:rgba(26,5,51,0.8);color:var(--text);font-size:15px;outline:none;resize:none;min-height:80px;margin-bottom:12px}
.mutation-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.mutation-row input{flex:1;accent-color:var(--primary)}
.mutation-val{text-align:center;color:var(--cyan);font-size:13px;margin-bottom:12px}
/* Logs */
.log-entry{padding:8px;margin:4px 0;background:rgba(26,5,51,0.3);border-radius:8px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="app-wrap">
  <div id="toast" class="toast"></div>

  <!-- Top Bar (shown after login) -->
  <div class="top-bar" id="top-bar" style="display:none">
    <div style="display:flex;align-items:center">
      <div class="avatar" id="bar-avatar">🦞</div>
      <span class="user-name" id="bar-name">Sky</span>
    </div>
    <span class="title">✨ 灵感火花</span>
    <span class="bell" onclick="showNav('hybrid')">🔔</span>
  </div>

  <main id="main-scroll">
    <!-- ===== Login Screen ===== -->
    <div class="screen active" id="screen-login">
      <div class="login-screen">
        <div class="login-icon">⚡</div>
        <div class="login-title">灵感火花</div>
        <div class="login-sub">碎片时间 · 深度思考 · 创意碰撞</div>
        <input class="login-name-input" id="login-name" placeholder="给自己起个名字" maxlength="12">
        <div class="avatar-grid" id="avatar-grid"></div>
        <button class="btn-explore" onclick="startExplore()">开始探索 🚀</button>
      </div>
    </div>

    <!-- ===== Screen 1: Inspire ===== -->
    <div class="screen" id="screen-inspire">
      <div class="input-area" id="inspire-input">
        <h1>灵感火花</h1>
        <div class="sub">碎片时间的灵感进化论</div>
        <textarea id="theme-input" placeholder="今天想什么方向？&#10;比如：解压玩具、失眠方案、猫咪产品…">解压玩具</textarea>
        <div class="mutation-row"><span style="font-size:12px;color:var(--muted)">靠谱</span><input type="range" id="mutation-slider" min="1" max="100" value="50"><span style="font-size:12px;color:var(--muted)">狂想</span></div>
        <div class="mutation-val" id="mutation-val">脑洞指数: 50</div>
        <button class="btn-primary" onclick="startSwipe()">🎴 开始发牌</button>
      </div>
      <div id="inspire-swipe" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px">
          <span style="color:var(--cyan);cursor:pointer;font-size:13px" onclick="backToInput()">← 换主题</span>
          <span id="theme-label" style="font-weight:600;font-size:15px">解压玩具</span>
          <span style="color:var(--muted);font-size:12px" id="card-count">0 张</span>
        </div>
        <div class="card-area"><div class="card-stack" id="card-stack"></div></div>
        <div style="text-align:center;font-size:12px;color:var(--muted);padding:4px 0">
          ✨ 已收藏 <strong id="saved-count-stats">0</strong> 张灵感种子
        </div>
        <div class="swipe-buttons">
          <div class="swipe-btn close" onclick="swipeLeft()">✕</div>
          <div class="swipe-btn mutate" onclick="swipeMutate()">⚡</div>
          <div class="swipe-btn heart" onclick="swipeRight()">♥</div>
        </div>
        <div class="swipe-hint">左滑淘汰 · 右滑留种 · ⚡ 突变</div>
      </div>
    </div>

    <!-- ===== Screen 2: Seeds ===== -->
    <div class="screen" id="screen-seeds">
      <div class="subnav" id="seeds-subnav">
        <button data-seed="saved" class="active" onclick="seedSubNav('saved')">📦 暂存</button>
        <button data-seed="hybrid" onclick="seedSubNav('hybrid')">🧬 杂交</button>
        <button data-seed="tree" onclick="seedSubNav('tree')">🌳 进化树</button>
      </div>
      <div id="seeds-saved">
        <div class="saved-header"><h3>📦 暂存池</h3><span style="color:var(--muted);font-size:12px" id="saved-count-label">0 张</span></div>
        <div id="saved-empty" class="empty-state">
          <div class="icon">🌱</div>
          还没有保存的种子<br>去「发现」页刷卡，右滑留种
        </div>
        <div id="saved-grid" class="saved-grid"></div>
        <div id="hybrid-btn-area" style="display:none;margin-top:12px">
          <button class="btn-primary" onclick="showNav('hybrid')">🧬 杂交选中的两张卡片</button>
        </div>
      </div>
      <div id="seeds-hybrid" style="display:none">
        <h3 style="font-size:17px;margin-bottom:10px">🧬 创意杂交</h3>
        <div class="hybrid-area">
          <div class="pick-row">
            <div class="hybrid-slot" id="slot-a" onclick="pickCard('a')"><div class="label">卡片 A</div><div class="content" id="slot-a-text">点击选择</div></div>
            <div class="hybrid-slot" id="slot-b" onclick="pickCard('b')"><div class="label">卡片 B</div><div class="content" id="slot-b-text">点击选择</div></div>
          </div>
        </div>
        <button class="btn-primary" onclick="doHybrid()" id="hybrid-go-btn" disabled>🧬 开始杂交</button>
        <div id="hybrid-result"></div>
        <div id="hybrid-explain" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
        <div id="pick-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:60;overflow-y:auto;padding:40px 16px;max-width:480px;margin:0 auto">
          <h3 style="margin-bottom:12px;text-align:center">选择卡片</h3>
          <div id="pick-list" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
          <button style="display:block;margin:16px auto;padding:10px 30px;border-radius:20px;border:1px solid var(--muted);background:none;color:var(--muted);cursor:pointer;font-size:14px" onclick="document.getElementById('pick-modal').style.display='none'">取消</button>
        </div>
      </div>
      <div id="seeds-tree" style="display:none">
        <h3 style="font-size:17px;margin-bottom:10px">🌳 灵感进化树</h3>
        <div class="tree-info">
          <div class="stat"><div class="num" id="tree-nodes">0</div><div class="lbl">节点</div></div>
          <div class="stat"><div class="num" id="tree-depth">0</div><div class="lbl">深度</div></div>
          <div class="stat"><div class="num" id="tree-logs">0</div><div class="lbl">孵化日志</div></div>
        </div>
        <div class="tree-viz" id="tree-viz"></div>
        <div style="font-weight:600;color:var(--cyan);margin:12px 0 4px">🥚 孵化日志</div>
        <div id="evolution-logs"></div>
      </div>
    </div>

    <!-- ===== Screen 3: Arena ===== -->
    <div class="screen" id="screen-arena">
      <div class="arena-placeholder">
        <div class="icon">⚡</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:8px">创意对战</div>
        <div style="font-size:14px;color:var(--muted)">即将上线</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">每周创意挑战 · 灵感对战 · 社区排行</div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav (3-tab) -->
  <div class="bottom-nav">
    <div class="nav-item active" data-screen="inspire" onclick="showNav('inspire')">
      <div class="icon">🔆</div><div class="lbl">灵感</div>
    </div>
    <div class="nav-item" data-screen="seeds" onclick="showNav('seeds')">
      <div class="icon">🌱</div><div class="lbl">种子</div>
    </div>
    <div class="nav-item" data-screen="arena" onclick="showNav('arena')">
      <div class="icon">⚡</div><div class="lbl">竞技</div>
    </div>
  </div>
</div>

<script>
// ===== State =====
const S={cards:[],saved:[],cardPoolIdx:0,hybridCards:{a:null,b:null},pickSlot:null,screen:'inspire',user:{name:'',avatar:'🦞'},questionLog:[]};
const MOCK={cards:[
  {id:'c0',text:'用AI生成个性化冥想引导，根据心率实时调整节奏和内容',domain:'健康',tech:'AI生成'},
  {id:'c1',text:'办公室解压舱：5分钟沉浸式自然场景+白噪音+香薰',domain:'办公',tech:'硬件整合'},
  {id:'c2',text:'用乐高积木搭建可编程的桌面机械臂，帮程序员拿咖啡',domain:'办公',tech:'硬件整合'},
  {id:'c3',text:'猫咪语言翻译项圈：AI分析叫声转文字推送手机',domain:'宠物',tech:'AI分析'},
  {id:'c4',text:'在VR里种虚拟树，现实世界每减少碳排放就长大一点',domain:'环保',tech:'gamification'},
  {id:'c5',text:'快递盒变身猫窝的标准化折叠设计，附带猫薄荷涂层',domain:'宠物',tech:'创意'},
  {id:'c6',text:'给前任的朋友圈自动加滤镜：越看越模糊',domain:'社交',tech:'AI生成'},
  {id:'c7',text:'用GitHub记录人生——每天commit一条生活决策',domain:'生产力',tech:'gamification'},
  {id:'c8',text:'会说话的盆栽：土壤湿度低了就抱怨口渴',domain:'家居',tech:'硬件整合'},
  {id:'c9',text:'AI吵架教练：分析对方论点弱点，实时推送反驳话术',domain:'社交',tech:'AI分析'},
],questionChain:['这个创意的核心假设是什么？','如果不成立，最可能的原因是什么？','换个角度看，这个问题的反面是什么？','如果去掉所有技术手段，最朴素的需求是什么？','这个解决方案可能会带来什么新问题？']};

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('ideaspark_user');
  if(saved){const u=JSON.parse(saved);S.user=u;showMain();}
  else{initAvatarGrid();}
  document.getElementById('mutation-slider').addEventListener('input',function(){document.getElementById('mutation-val').textContent='脑洞指数: '+this.value;});
  document.getElementById('pick-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
});

function initAvatarGrid(){
  const avatars=['🦞','🦊','🐼','🐱','🦥','🐙','🦄','🐲'];
  const g=document.getElementById('avatar-grid');
  g.innerHTML=avatars.map((a,i)=>'<div class="avatar-option'+(i===0?' selected':'')+'" data-avatar="'+a+'" onclick="pickAvatar(this,\''+a+'\')">'+a+'</div>').join('');
  S.user.avatar=avatars[0];
}
function pickAvatar(el,a){document.querySelectorAll('.avatar-option').forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');S.user.avatar=a;}
function startExplore(){
  var name=document.getElementById('login-name').value.trim()||'灵感家';
  S.user.name=name;
  localStorage.setItem('ideaspark_user',JSON.stringify(S.user));
  showMain();
}
function showMain(){
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('top-bar').style.display='flex';
  document.getElementById('bar-avatar').textContent=S.user.avatar;
  document.getElementById('bar-name').textContent=S.user.name;
  showNav('inspire');
}

// ===== Navigation =====
function showNav(screen){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  if(screen==='inspire'){document.getElementById('screen-inspire').classList.add('active');showInspireInput();}
  else if(screen==='seeds'){document.getElementById('screen-seeds').classList.add('active');seedSubNav('saved');}
  else if(screen==='arena'){document.getElementById('screen-arena').classList.add('active');}
  else if(screen==='hybrid'){document.getElementById('screen-seeds').classList.add('active');seedSubNav('hybrid');}
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var map={inspire:'inspire',seeds:'seeds',hybrid:'seeds',arena:'arena'};
  var n=document.querySelector('.nav-item[data-screen="'+(map[screen]||'inspire')+'"]');
  if(n)n.classList.add('active');
  S.screen=screen;
  document.getElementById('main-scroll').scrollTo({top:0});
}
function showInspireInput(){
  document.getElementById('inspire-input').style.display='block';
  document.getElementById('inspire-swipe').style.display='none';
}
function seedSubNav(s){
  document.querySelectorAll('#seeds-subnav button').forEach(function(b){b.classList.remove('active');});
  var btn=document.querySelector('#seeds-subnav button[data-seed="'+s+'"]');
  if(btn)btn.classList.add('active');
  ['saved','hybrid','tree'].forEach(function(x){var el=document.getElementById('seeds-'+x);if(el)el.style.display=x===s?'block':'none';});
  if(s==='saved')loadSaved();
  if(s==='tree'){renderTree();renderLogs();}
  updateHybridBtn();
}
function backToInput(){showInspireInput();}

// ===== Cards =====
function startSwipe(){
  var theme=document.getElementById('theme-input').value.trim()||'解压玩具';
  document.getElementById('theme-label').textContent=theme;
  S.cards=[];S.cardPoolIdx=0;
  var pool=[].concat(MOCK.cards);
  for(var i=0;i<10;i++){var c=Object.assign({},pool[i%pool.length]);c.id='g'+i+Date.now();c.removed=false;S.cards.push(c);}
  document.getElementById('inspire-input').style.display='none';
  document.getElementById('inspire-swipe').style.display='block';
  document.getElementById('card-count').textContent=S.cards.length+' 张';
  renderCards();
}
function renderCards(){
  var stack=document.getElementById('card-stack');
  var visible=S.cards.filter(function(c){return !c.removed;}).slice(0,3);
  if(visible.length===0){
    if(S.cardPoolIdx<30){S.cardPoolIdx++;startSwipe();return;}
    stack.innerHTML='<div class="card"><div style="font-size:40px;margin-bottom:12px">🎉</div>本轮结束<br><span style="font-size:13px;color:var(--muted)">换个主题试试</span></div>';
    return;
  }
  stack.innerHTML=visible.map(function(c,i){return '<div class="card" id="card-'+c.id+'" style="z-index:'+(3-i)+';transform:scale('+(1-i*0.03)+') translateY('+(i*6)+'px);opacity:'+(1-i*0.15)+'"><div style="flex:1;display:flex;flex-direction:column;justify-content:center"><p>'+c.text+'</p><span class="domain">'+(c.domain||'')+' · '+(c.tech||'')+'</span></div></div>';}).join('');
  document.getElementById('card-count').textContent=S.cards.filter(function(c){return !c.removed;}).length+' 张';
}
function swipeLeft(){doSwipe('left');}
function swipeRight(){doSwipe('right');}
function swipeMutate(){doSwipe('mutate');}
function doSwipe(dir){
  var visible=S.cards.filter(function(c){return !c.removed;});
  if(visible.length===0)return;
  var card=visible[0];card.removed=true;
  if(dir==='right'){
    if(!S.saved.find(function(s){return s.card_id===card.id;})){
      S.saved.push({id:'s-'+Date.now(),card_id:card.id,card_content:card.text.substring(0,30)+'…',source:'swipe',createdAt:Date.now(),questions:[]});
      toast('🌱 已收藏');
    }
  }else if(dir==='mutate'){
    var mut=card.text.split('').reverse().join('').substring(0,35)+'…';
    S.saved.push({id:'s-'+Date.now(),card_id:card.id+'-mut',card_content:mut,source:'mutate',createdAt:Date.now(),questions:[]});
    toast('⚡ 突变种子已保存');
  }else{toast('✕ 淘汰');}
  updateBadge();renderCards();
}
function updateBadge(){document.getElementById('saved-count-stats').textContent=S.saved.length;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}

// ===== Saved =====
function loadSaved(){
  var grid=document.getElementById('saved-grid');
  var empty=document.getElementById('saved-empty');
  document.getElementById('saved-count-label').textContent=S.saved.length+' 张';
  if(S.saved.length===0){empty.style.display='block';grid.innerHTML='';return;}
  empty.style.display='none';
  grid.innerHTML=S.saved.map(function(s){return '<div class="saved-card'+(s._sel?' selected':'')+'" id="saved-'+s.id+'" onclick="toggleSavedSelect(\''+s.id+'\')"><div style="font-size:13px;line-height:1.4">'+s.card_content+'</div><div style="font-size:11px;color:var(--muted);margin-top:3px">'+(s.source==='hybrid'?'🧬':'🎴')+' '+new Date(s.createdAt).toLocaleDateString()+'</div>'+(s._sel?'<span class="check">✓</span>':'')+'</div>';}).join('');
  updateHybridBtn();
}
function toggleSavedSelect(id){
  var item=S.saved.find(function(s){return s.id===id;});if(!item)return;
  item._sel=!item._sel;
  if(S.saved.filter(function(s){return s._sel;}).length>2){item._sel=false;}
  loadSaved();
}
function updateHybridBtn(){
  var sel=S.saved.filter(function(s){return s._sel;});
  var area=document.getElementById('hybrid-btn-area');
  area.style.display=sel.length===2?'block':'none';
}

// ===== Hybrid =====
function pickCard(slot){S.pickSlot=slot;var modal=document.getElementById('pick-modal');var list=document.getElementById('pick-list');list.innerHTML=S.saved.map(function(s){return '<div class="saved-card" onclick="selectCard(\''+slot+'\',\''+s.id+'\',\''+s.card_content.replace(/'/g,"\\'")+'\')" style="font-size:12px">'+s.card_content+'</div>';}).join('');modal.style.display='block';}
function selectCard(slot,id,content){S.hybridCards[slot]={id:id,content:content};document.getElementById('slot-'+slot).classList.add('filled');document.getElementById('slot-'+slot+'-text').textContent=content;document.getElementById('pick-modal').style.display='none';document.getElementById('hybrid-go-btn').disabled=!(S.hybridCards.a&&S.hybridCards.b);}
async function doHybrid(){
  if(!S.hybridCards.a||!S.hybridCards.b)return;
  var a=S.hybridCards.a.content,b=S.hybridCards.b.content;
  var result;
  try{
    var r=await fetch('/api/evolution/crossover?engine=llm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seed_a_text:a,seed_b_text:b})});
    var d=await r.json();
    result={type:'llm',offspring:d.offspring||[],parent_dims:d.parent_dimensions};
  }catch(e){result={type:'mock',offspring:[a.substring(0,15)+' × '+b.substring(0,15)],parent_dims:{}};}
  var hybrid=document.getElementById('hybrid-result');
  hybrid.innerHTML=result.offspring.map(function(o,i){return '<div class="result-card"><div class="label">'+['单点交叉','均匀交叉','变异交叉'][i]+'</div>'+(typeof o==='string'?o:o.text||o.content||'')+'</div>';}).join('');
  document.getElementById('hybrid-explain').innerHTML=result.type==='llm'?'🧬 <b>LLM杂交</b>':'📋 模板杂交（后端未连接）';
  if(!document.getElementById('save-hybrid-btn')){
    var btn=document.createElement('button');btn.id='save-hybrid-btn';btn.className='btn-primary';btn.textContent='💾 保存杂交结果';btn.onclick=saveHybrid;
    hybrid.appendChild(btn);
  }
}
function saveHybrid(){
  var results=document.querySelectorAll('.result-card');
  results.forEach(function(r,i){if(r.querySelector('.label')){var text=r.textContent.replace(r.querySelector('.label').textContent,'').trim();if(text)S.saved.push({id:'h-'+Date.now()+'-'+i,card_id:'hybrid-'+i,card_content:text.substring(0,30)+'…',source:'hybrid',createdAt:Date.now(),questions:[]});}});
  toast('🧬 杂交结果已保存');loadSaved();
}

// ===== Tree =====
function renderTree(){
  document.getElementById('tree-nodes').textContent=S.saved.length;
  document.getElementById('tree-depth').textContent=Math.min(S.saved.length,5);
  var viz=document.getElementById('tree-viz');
  if(S.saved.length===0){viz.innerHTML='<span style="color:var(--muted)">🌱 保存灵感种子后，进化树会生长</span>';return;}
  viz.innerHTML='🌳 '+S.saved.map(function(s,i){return (i>0?' → ':'')+(s.source==='hybrid'?'🧬':'🌱')+s.card_content.substring(0,10);}).join('');
}
function renderLogs(){
  document.getElementById('tree-logs').textContent=S.questionLog.length+S.saved.filter(function(s){return s.source==='hybrid';}).length;
  var logs=document.getElementById('evolution-logs');
  if(S.questionLog.length===0){logs.innerHTML='<div class="log-entry">暂无孵化日志</div>';return;}
  logs.innerHTML=S.questionLog.slice(-5).map(function(l){return '<div class="log-entry">'+l+'</div>';}).join('');
}
</script>
</body>
</html>
